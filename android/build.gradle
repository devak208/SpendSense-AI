// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
        maven { url "$rootDir/../node_modules/@notifee/react-native/android/libs" }
  }
  dependencies {
        classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
        maven { url "$rootDir/../node_modules/@notifee/react-native/android/libs" }
    maven { url 'https://www.jitpack.io' }
  }

  // FORCE ALL SUBPROJECTS TO MATCH AGP VERSION 8.11.0 
  // This fixes the "No matching variant of project" error in Expo SDK 54
  configurations.all {
    attributes {
      attribute(Attribute.of("com.android.build.api.attributes.AgpVersionAttr", String.class), "8.11.0")
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
